<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-error": "#ffefee",
                    "primary-container": "#2ea7ff",
                    "surface-container-highest": "#cbe0ee",
                    "on-surface": "#233038",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#00a1fe",
                    "primary-dim": "#005386",
                    "surface-tint": "#005f99",
                    "tertiary-fixed-dim": "#b191fe",
                    "surface-container": "#d9ebf7",
                    "primary-fixed": "#2ea7ff",
                    "secondary-fixed": "#fecb00",
                    "primary-fixed-dim": "#0099f2",
                    "tertiary-dim": "#5b3aa3",
                    "error-dim": "#9f0519",
                    "outline-variant": "#a1afb9",
                    "on-tertiary-fixed-variant": "#44208b",
                    "secondary-fixed-dim": "#eebe00",
                    "on-tertiary": "#f8f0ff",
                    "on-secondary-fixed-variant": "#634e00",
                    "background": "#eff8ff",
                    "on-error-container": "#570008",
                    "surface-variant": "#cbe0ee",
                    "inverse-surface": "#031017",
                    "on-surface-variant": "#505d66",
                    "surface-container-low": "#e3f3ff",
                    "tertiary-container": "#bda1ff",
                    "on-secondary": "#fff1d5",
                    "surface-container-high": "#d2e5f3",
                    "primary": "#005f99",
                    "surface-bright": "#eff8ff",
                    "on-primary-fixed-variant": "#002e4e",
                    "on-tertiary-fixed": "#1f0052",
                    "on-secondary-fixed": "#413200",

            "borderRadius": {

                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-white">
<!-- Transactional Layout: Navigation shells suppressed for focused registration flow -->
<div class="w-full max-w-xl relative">
<!-- Brand Identity Placement -->
<div class="mb-12 text-center">
<div class="inline-flex items-center gap-3 bg-primary-container px-6 py-3 rounded-full shadow-lg transform -rotate-2">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
<span class="text-white font-black italic tracking-tighter text-2xl">SMASH EVENTS</span>
</div>
</div>
<!-- Registration Card -->
<main class="bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_rgba(0,95,153,0.08)] overflow-hidden border border-white/40">
<!-- Top Visual Accent -->
<div class="h-48 relative overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Retro neon arcade cabinet buttons and joysticks in a vibrant high-energy gaming hall with blue and yellow lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDB8ra8gEYaD_G3-5U7mr6uXhr1vZPEZVwR7mw8VVaicFskaFfl9iP2R93Qq6Que7fPBnjcoT6btvtqoR4Q7F6vLe2AZsIFwzOLuXaeqkP_rjOBkH_YqBe7hDFEKD3HCSRdafxjEi4q2kT_z2doUdUWhmVri3Dmzqt3HATNLP7vrxuz-tlgkQ3hkjIjhsuOEdjszLu9izELY3uPQeI17XRBLEeXHEThK1d0pqsFXAKgJ_8qdkqURLN8KlwqwxIfIVhPVjzMIKLkbqf4"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
</div>
<div class="px-10 pb-12 pt-4">
<div class="mb-10">
<h1 class="text-on-surface font-extrabold text-4xl tracking-tight leading-none mb-2">JOIN THE ARENA</h1>
<p class="text-on-surface-variant font-medium">Claim your player tag and get ready for the next smash event.</p>
</div>
<form class="space-y-8">
<!-- Input: Name -->
<div class="space-y-3">
<label class="block font-bold text-sm tracking-widest uppercase text-primary ml-1">Full Name</label>
<div class="group relative transition-all duration-300 transform hover:scale-[1.01]">
<input class="w-full h-16 px-6 rounded-lg bg-surface-container-high border-0 focus:ring-4 focus:ring-primary-container/20 text-on-surface font-semibold text-lg placeholder:text-on-surface-variant/40 transition-all" placeholder="Enter your real name" type="text"/>
<span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary-dim/30">badge</span>
</div>
</div>
<!-- Input: UID -->
<div class="space-y-3">
<label class="block font-bold text-sm tracking-widest uppercase text-primary ml-1">Unique Player UID</label>
<div class="group relative transition-all duration-300 transform hover:scale-[1.01]">
<input class="w-full h-16 px-6 rounded-lg bg-surface-container-high border-0 focus:ring-4 focus:ring-primary-container/20 text-on-surface font-semibold text-lg placeholder:text-on-surface-variant/40 transition-all" placeholder="SMASH-XXXX" type="text"/>
<span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary-dim/30">fingerprint</span>
</div>
</div>
<!-- Input: Email -->
<div class="space-y-3">
<label class="block font-bold text-sm tracking-widest uppercase text-primary ml-1">Email Address</label>
<div class="group relative transition-all duration-300 transform hover:scale-[1.01]">
<input class="w-full h-16 px-6 rounded-lg bg-surface-container-high border-0 focus:ring-4 focus:ring-primary-container/20 text-on-surface font-semibold text-lg placeholder:text-on-surface-variant/40 transition-all" placeholder="player@smash.com" type="email"/>
<span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary-dim/30">alternate_email</span>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full py-5 rounded-full bg-secondary-container text-on-secondary-container font-black text-xl uppercase tracking-wider flex items-center justify-center gap-3 shadow-[0_15px_30px_-5px_rgba(254,203,0,0.4)] active:scale-95 transition-all cubic-bezier(0.34,1.56,0.64,1) hover:scale-105 hover:bg-secondary-fixed" type="submit">
                            Proceed to Payment
                            <span class="material-symbols-outlined">double_arrow</span>
</button>
<p class="text-center mt-6 text-on-surface-variant/60 text-xs font-bold uppercase tracking-tighter">
                            By clicking proceed, you agree to our Tournament Rules
                        </p>
</div>
</form>
</div>
</main>
<!-- Asymmetrical Decoration -->
<div class="absolute -bottom-10 -right-10 h-32 w-32 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="absolute -top-20 -left-20 h-64 w-64 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
