services:
  db:
    image: postgres:15-alpine
    container_name: smash_db
    restart: always
    environment:
      POSTGRES_USER: kartsmasher
      POSTGRES_PASSWORD: kart_password
      POSTGRES_DB: kartsmasher_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: smash_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kartsmasher.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      PGADMIN_CONFIG_MAX_LOGIN_ATTEMPTS: 10  # <--- ADD THIS LINE
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smash_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://kartsmasher:kart_password@db:5432/kartsmasher_db
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smash_frontend
    ports:
      - "8081:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data: